<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Manager | Cloud Edition</title>
    <!-- استفاده از Cloudflare CDN جایگزین -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* استایل‌های ضروری - در صورت عدم لود Tailwind */
        * { font-family: system-ui; margin: 0; padding: 0; box-sizing: border-box; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .flex-1 { flex: 1; }
        .h-screen { height: 100vh; }
        .overflow-hidden { overflow: hidden; }
        .overflow-y-auto { overflow-y: auto; }
        .p-4 { padding: 1rem; }
        .p-5 { padding: 1.25rem; }
        .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .w-72 { width: 18rem; }
        .bg-white { background: white; }
        .rounded-xl { border-radius: 0.75rem; }
        .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .cursor-pointer { cursor: pointer; }
        .hidden { display: none; }
        .text-center { text-align: center; }
        .text-sm { font-size: 0.875rem; }
        
        body { background: linear-gradient(135deg, #e0f2fe, #dcfce7); }
        .sidebar { background: linear-gradient(180deg, #e6f7ec, #d1fae5); border-right: 1px solid #a7f3d0; }
        .sidebar-item-active { background: #10b981; color: white !important; }
        .sidebar-link { color: #065f46; transition: 0.2s; display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; border-radius: 0.75rem; }
        .sidebar-link:hover { background: rgba(16,185,129,0.15); }
        .btn-primary { background: #059669; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; }
        .btn-primary:hover { background: #047857; }
        .users-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
        .user-card { background: white; border-radius: 1rem; padding: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 1rem; max-width: 500px; width: 90%; padding: 1.5rem; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #065f46; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; animation: fadeOut 2.5s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

<div class="flex h-screen">
    <aside class="w-72 sidebar flex flex-col">
        <div class="p-5 border-b border-emerald-200">
            <h2 class="font-bold text-xl">Meeting<span style="color:#059669">Hub</span></h2>
            <p class="text-xs">نسخه ابری</p>
        </div>
        <nav class="flex-1 py-6 px-3">
            <a href="#" data-tab="dashboard" class="sidebar-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="#" data-tab="users" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
            <a href="#" data-tab="meetings" class="sidebar-link"><i class="fas fa-calendar-check"></i> Meetings</a>
            <a href="#" data-tab="tasks" class="sidebar-link"><i class="fas fa-tasks"></i> Tasks</a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white/90 p-4 shadow-md">
            <h3 class="text-lg font-bold">مدیریت جلسات</h3>
            <p class="text-xs text-gray-500">نسخه تست - روی GitHub Pages</p>
        </header>

        <main class="flex-1 overflow-y-auto p-5">
            <div id="dashboard-tab" class="tab-content">
                <h1 class="text-2xl font-bold">📊 Dashboard</h1>
                <div class="grid" style="grid-template-columns:repeat(4,1fr); gap:1rem; margin-top:1rem">
                    <div class="bg-white rounded-xl p-4 text-center"><p id="dashUsers" class="text-2xl font-bold text-emerald-600">0</p><p>Users</p></div>
                    <div class="bg-white rounded-xl p-4 text-center"><p id="dashMeetings" class="text-2xl font-bold text-emerald-600">0</p><p>Meetings</p></div>
                </div>
                <div class="bg-white rounded-xl p-4 mt-4"><canvas id="typeChart" height="150"></canvas></div>
            </div>

            <div id="users-tab" class="tab-content hidden">
                <div class="flex justify-between mb-4"><h2>👥 Users</h2><button onclick="openAddUserModal()" class="btn-primary">➕ Add User</button></div>
                <div id="usersListContainer" class="users-grid"></div>
            </div>

            <div id="meetings-tab" class="tab-content hidden">
                <div class="bg-white rounded-xl p-4"><h2>📅 Schedule Meeting</h2>
                    <select id="meetingUserSelect" class="w-full p-2 border rounded my-2"><option>-- Select User --</option></select>
                    <input type="datetime-local" id="meetingDateTime" class="w-full p-2 border rounded my-2">
                    <input type="number" id="meetingDuration" placeholder="Duration" class="w-full p-2 border rounded my-2">
                    <button onclick="addMeeting()" class="btn-primary w-full">Save Meeting</button>
                </div>
                <div id="usersCardsContainer" class="users-grid mt-4"></div>
            </div>

            <div id="tasks-tab" class="tab-content hidden">
                <div class="bg-white rounded-xl p-4"><h2>✅ Tasks</h2>
                    <input type="text" id="taskTitle" placeholder="Task title" class="w-full p-2 border rounded my-2">
                    <input type="date" id="taskDate" class="w-full p-2 border rounded my-2">
                    <button onclick="addTask()" class="btn-primary w-full">Add Task</button>
                </div>
                <div id="tasksList" class="mt-4"></div>
            </div>
        </main>
    </div>
</div>

<div id="addUserModal" class="modal"><div class="modal-content"><h3>Add User</h3><input type="text" id="newUsername" class="w-full p-2 border rounded my-2"><button onclick="saveUser()" class="btn-primary w-full">Save</button><button onclick="closeAddUserModal()" class="btn-primary w-full mt-2" style="background:gray">Cancel</button></div></div>

<script>
    // تنظیمات Supabase
    const SUPABASE_URL = "https://buowqguzsrychwoxyqby.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b3dxZ3V6c3J5Y2h3b3h5cWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI3MTQ1MzIsImV4cCI6MjA3ODI5MDUzMn0._2j0iRUY4L8x_59tDMEBh8qjSTHZdUOPd0nFqPZkXAk";
    
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let users = [], meetings = [], tasks = [];
    
    function showToast(msg) { let t=document.createElement('div');t.className='toast';t.innerHTML=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500); }
    
    async function loadUsers() { let {data}=await supabase.from('users').select('*'); if(data) users=data; renderAll(); }
    async function loadMeetings() { let {data}=await supabase.from('meetings').select('*'); if(data) meetings=data; renderAll(); }
    
    async function saveUser() { let username=document.getElementById('newUsername').value; if(!username) return; let newUser={id:Date.now(),username}; users.push(newUser); await supabase.from('users').upsert(newUser); closeAddUserModal(); renderAll(); showToast('User added'); }
    async function addMeeting() { let userId=document.getElementById('meetingUserSelect').value; if(!userId) return; let dateTime=document.getElementById('meetingDateTime').value; let duration=document.getElementById('meetingDuration').value; if(!dateTime||!duration) return; let [date,time]=dateTime.split('T'); let user=users.find(u=>u.id==userId); let newMeeting={id:Date.now(),userId:user.id,userName:user.username,date,time:time.substring(0,5),duration:parseInt(duration),type:'Team',mom:''}; meetings.push(newMeeting); await supabase.from('meetings').upsert(newMeeting); renderAll(); showToast('Meeting added'); }
    async function addTask() { let title=document.getElementById('taskTitle').value; let date=document.getElementById('taskDate').value; if(!title||!date) return; let newTask={id:Date.now(),type:'task',title,date,time:'12:00',priority:'medium',completed:false}; tasks.push(newTask); await supabase.from('tasks').upsert(newTask); renderTasks(); showToast('Task added'); }
    
    function renderUsersList() { let container=document.getElementById('usersListContainer'); if(!container) return; container.innerHTML=users.map(u=>`<div class='user-card'><b>${u.username}</b><br><button onclick='deleteUser(${u.id})' class='text-red-500 text-sm mt-2'>Delete</button></div>`).join(''); }
    function renderUsersCards() { let container=document.getElementById('usersCardsContainer'); if(!container) return; container.innerHTML=users.map(u=>`<div class='user-card'><b>${u.username}</b><br><button onclick='selectUserForMeeting(${u.id})' class='btn-primary text-sm w-full mt-2'>Set Meeting</button></div>`).join(''); }
    function renderTasks() { let container=document.getElementById('tasksList'); if(!container) return; container.innerHTML=tasks.filter(t=>t.type==='task').map(t=>`<div class='bg-white rounded p-2 mb-2'>✅ ${t.title} - ${t.date}</div>`).join(''); }
    function renderUserSelect() { let sel=document.getElementById('meetingUserSelect'); if(sel) sel.innerHTML='<option>-- Select User --</option>'+users.map(u=>`<option value='${u.id}'>${u.username}</option>`).join(''); }
    function updateCounts() { document.getElementById('dashUsers')&&(document.getElementById('dashUsers').innerText=users.length); document.getElementById('dashMeetings')&&(document.getElementById('dashMeetings').innerText=meetings.length); }
    function renderAll() { renderUsersList(); renderUsersCards(); renderUserSelect(); renderTasks(); updateCounts(); }
    
    function deleteUser(id) { if(confirm('Delete?')){ users=users.filter(u=>u.id!==id); meetings=meetings.filter(m=>m.userId!==id); supabase.from('users').delete().eq('id',id); supabase.from('meetings').delete().eq('user_id',id); renderAll(); showToast('Deleted'); } }
    function selectUserForMeeting(id) { document.getElementById('meetingUserSelect').value=id; document.getElementById('meetingDateTime').focus(); showToast('Fill meeting details'); }
    function openAddUserModal() { document.getElementById('addUserModal').style.display='flex'; }
    function closeAddUserModal() { document.getElementById('addUserModal').style.display='none'; }
    
    function switchTab(tabId) { document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden')); document.getElementById(`${tabId}-tab`).classList.remove('hidden'); document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('sidebar-item-active')); let active=document.querySelector(`.sidebar-link[data-tab="${tabId}"]`); if(active) active.classList.add('sidebar-item-active'); if(tabId==='meetings') renderUsersCards(); if(tabId==='tasks') renderTasks(); if(tabId==='users') renderUsersList(); }
    
    document.querySelectorAll('.sidebar-link').forEach(link=>{ link.addEventListener('click',(e)=>{ e.preventDefault(); switchTab(link.getAttribute('data-tab')); }); });
    
    loadUsers(); loadMeetings(); switchTab('dashboard');
</script>
</body>
</html>
